# InvBackup Configuration

# Language: zh_CN, en_US (or custom file in lang/ folder)
language: zh_CN

# Backup level: minimal (items only) or full (items + status)
backup-level: full

# Auto backup settings
auto-backup:
  on-quit: true
  on-join: false
  # Auto save interval in seconds (0 = disabled)
  interval: 0

# Backup strategy (new)
# Notes:
# 1) Old auto-backup.* and max-snapshots are still supported for backward compatibility.
# 2) If backup-strategy.events.* exists, it takes precedence over legacy auto-backup.*.
backup-strategy:
  events:
    on-join: false
    on-quit: true
    on-death: true
    on-world-change: true
    # true = only backup when entering Nether/End on world-change.
    # false = backup on any world change.
    world-change-only-nether-end: false
    # 0 = disabled
    interval-seconds: 0
    # Optional explicit switch for interval task
    on-interval: true

  coalesce:
    enabled: true
    # Calls within this window are merged into one auto backup per player.
    window-seconds: 45
    # Trigger types that use coalescing
    apply-triggers:
      - interval
      - join
      - death
      - world-change

  retention:
    enabled: true
    # If true, max-snapshots still applies after tiered retention.
    enforce-max-snapshots: true
    # Tiered retention: older snapshots require larger minimum gap.
    # max-age <= 0 means "no upper bound" (catch-all tier).
    tiers:
      recent:
        max-age-hours: 24
        min-gap-minutes: 15
      daily:
        max-age-days: 7
        min-gap-hours: 1
      weekly:
        max-age-days: 30
        min-gap-days: 1
      archived:
        max-age-days: 0
        min-gap-days: 7

  pre-restore:
    # Create a safety backup before first restore action in Restore GUI and before forcerestore.
    enabled: true
    # If true and safety backup fails, block the restore action.
    require-success: false
    # Send a confirmation message with snapshot ID when safety backup succeeds.
    notify-success: false
    label: "Pre-restore safety backup"

  high-risk:
    # For /ib forcerestore
    before-force-restore: true

  integrity-check:
    enabled: true
    # Run integrity scan every N successful saves per player.
    every-n-saves: 10
    # true = remove corrupted snapshots; false = keep and mark as corrupt.
    remove-corrupt: false

# Maximum snapshots per player (0 = unlimited)
max-snapshots: 20

# Restore request settings
restore-request:
  # Days until a pending request expires (0 = never)
  expire-days: 7
  # Seconds during which an accepted request can reopen Restore GUI.
  # 0 = can only open once; >0 = can reopen within N seconds.
  open-window-seconds: 0
  # How /ib accept -> RestoreGui "Restore All" should handle overflow:
  # drop: extra items that don't fit in the inventory will be dropped at player's feet.
  # keep: extra items will NOT be restored and will remain available in future requests/GUI.
  restore-all-overflow: drop
  # Whether to also match by player name when delivering queued requests.
  # true: if UUIDs changed (e.g. offline/online mode switch), requests with matching target-name
  #       will be migrated to the current UUID on join and still be delivered.
  # false: only UUID must match; name will be ignored.
  match-by-name: true
  # Whether admins can open RestoreGui and type another player's name
  # to queue a cross-player restore request (A's snapshot -> B).
  manual-name-input:
    enabled: false

# Embedded read-only web UI
web:
  # Default is false for safety. Enable to start the embedded HTTP server.
  enabled: false
  # Bind to localhost unless you explicitly need remote access.
  host: "127.0.0.1"
  port: 5800

  auth:
    enabled: true
    # Set a strong random token in production.
    # The token can be passed via header "X-InvBackup-Token"
    # (or "Authorization: Bearer <token>").
    token: "change-me"
    # Convenience for browser quick-open links: http://host:port/?token=...
    allow-query-token: true

  api:
    default-limit: 200
    max-limit: 1000

  icons:
    # Base path used by the embedded web API icon proxy.
    # You can use {mc} / {mc_version} / {minecraft} as placeholders.
    remote-base: "https://assets.mcasset.cloud/{mc}/assets/minecraft/textures"
    # Temporary in-memory icon cache on plugin side.
    cache-ttl-seconds: 600
    cache-max-entries: 1024
